services:
  marin:
    build: .
    container_name: marin-hs02
    restart: unless-stopped
    ports:
      - "5069:5069"   # Main chat UI
      - "5080:5080"   # RAG server
      - "5070:5070"   # ModuleFlow
    env_file:
      - .env
    environment:
      # Reach host Ollama from container
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    volumes:
      # Persist databases and FAISS index
      - ./storage:/app/storage
      # RAG corpus
      - ./doc:/app/doc
      - ./code:/app/code
      # User uploads & generated content
      - ./static/uploads:/app/static/uploads
      - ./static/generated:/app/static/generated
      - ./static/downloads:/app/static/downloads
      # Logs
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5069"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
