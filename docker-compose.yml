services:
  marin:
    build: .
    container_name: marin-hs02
    restart: unless-stopped
    # Security hardening: removed unconfined security options
    user: root
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_PTRACE
    # Bridge mode for isolation
    network_mode: bridge
    ports:
      - "5069:5069"
      - "5080:5080"
      - "5070:5070"
    # Linux host-gateway for Ollama access
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 1G
          cpus: '0.5'
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - OWNER_USER=Bayazid
      - MARIN_ROLE=owner
      - DOCKER_CONTAINER=1
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=$HF_TOKEN
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5069"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
