<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marin — Agent Logs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#0a0a0f;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.topbar{height:40px;background:#0f0f1a;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.topbar h1{font-size:13px;color:#a78bfa;font-weight:600}
.topbar .status{font-size:10px;color:#34d399;margin-left:auto}
.topbar .status.off{color:#f87171}
.topbar button{background:none;border:1px solid #2a2a4a;color:#94a3b8;padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit}
.topbar button:hover{border-color:#a78bfa;color:#a78bfa}
.log-container{flex:1;overflow-y:auto;padding:12px 16px}
.log-entry{display:flex;gap:12px;padding:6px 10px;border-radius:4px;margin-bottom:2px;font-size:11px;transition:background 0.15s}
.log-entry:hover{background:rgba(167,139,250,0.08)}
.log-time{color:#64748b;min-width:65px;flex-shrink:0}
.log-node{min-width:90px;flex-shrink:0;font-weight:600;border-radius:3px;padding:0 6px;text-align:center}
.log-node.strategist{color:#22d3ee;background:rgba(34,211,238,0.1)}
.log-node.executor{color:#34d399;background:rgba(52,211,153,0.1)}
.log-node.auditor{color:#fbbf24;background:rgba(251,191,36,0.1)}
.log-node.persona{color:#f472b6;background:rgba(244,114,182,0.1)}
.log-node.system{color:#94a3b8;background:rgba(148,163,184,0.1)}
.log-action{color:#a78bfa;font-weight:500;min-width:110px;flex-shrink:0}
.log-detail{color:#94a3b8;flex:1;word-break:break-word}
.highlight{animation:flash 0.5s ease}
@keyframes flash{0%{background:rgba(167,139,250,0.2)}100%{background:transparent}}
.empty{text-align:center;color:#64748b;padding:40px;font-size:12px}
</style>
</head>
<body>
<div class="topbar">
  <h1>MARIN — Agent Activity</h1>
  <span class="status" id="status">● LIVE</span>
  <button onclick="clearLogs()">Clear</button>
  <button onclick="toggleAuto()">Auto: <span id="auto-label">ON</span></button>
</div>
<div class="log-container" id="logs">
  <div class="empty">Waiting for agent activity...</div>
</div>
<script>
let autoRefresh = true;
let lastCount = 0;

async function fetchLogs() {
    try {
        const res = await fetch('/api/logs?limit=200');
        const entries = await res.json();
        const container = document.getElementById('logs');
        
        if (entries.length === 0) {
            container.innerHTML = '<div class="empty">No logs yet. Talk to Marin and watch her think here.</div>';
            return;
        }

        const newEntries = entries.slice(lastCount);
        lastCount = entries.length;

        if (newEntries.length > 0 && container.querySelector('.empty')) {
            container.innerHTML = '';
        }

        for (const e of newEntries) {
            const div = document.createElement('div');
            div.className = 'log-entry highlight';
            div.innerHTML = `
                <span class="log-time">${e.t}</span>
                <span class="log-node ${e.node}">${e.node}</span>
                <span class="log-action">${e.action}</span>
                <span class="log-detail">${e.detail || ''}</span>
            `;
            container.appendChild(div);
        }

        // If new entries arrived, scroll to bottom
        if (newEntries.length > 0) {
            container.scrollTop = container.scrollHeight;
        }
    } catch (e) {
        document.getElementById('status').className = 'status off';
        document.getElementById('status').textContent = '● DISCONNECTED';
    }
}

function toggleAuto() {
    autoRefresh = !autoRefresh;
    document.getElementById('auto-label').textContent = autoRefresh ? 'ON' : 'OFF';
}

async function clearLogs() {
    // Just reload with fresh state
    lastCount = 0;
    document.getElementById('logs').innerHTML = '<div class="empty">Cleared. Waiting for new activity...</div>';
}

// Fetch immediately, then every 2 seconds
fetchLogs();
setInterval(() => { if (autoRefresh) fetchLogs(); }, 2000);
</script>
</body>
</html>
