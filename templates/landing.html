<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marin Tools — Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #4db8a4;
            --text: #e8ddd0;
            --dim: #8a7d72;
            --gold: #c9965a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .hero-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(77, 184, 164, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .portal-container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            border: 1px solid rgba(77, 184, 164, 0.2);
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin-bottom: 0px;
            letter-spacing: 6px;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(77, 184, 164, 0.4);
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--dim);
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(77, 184, 164, 0.1);
            padding: 30px 20px;
            border-radius: 4px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .portal-card:hover {
            background: rgba(77, 184, 164, 0.1);
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .portal-card .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .portal-card .title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .portal-card .desc {
            font-size: 0.85rem;
            color: var(--dim);
            line-height: 1.4;
        }

        .btn-auth {
            display: inline-flex;
            align-items: center;
            background: white;
            color: #000;
            padding: 12px 28px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-auth:hover {
            background: var(--accent);
            transform: scale(1.05);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: var(--dim);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    
    <div class="portal-container">
        <h1>MARIN TOOLS</h1>
        <p class="tagline">Sentinel & Orchestration Portal</p>

        <div class="grid">
            <a href="/chat" class="portal-card">
                <span class="icon">💬</span>
                <div class="title">CHAT</div>
                <div class="desc">Intelligent chat with study plan integration.</div>
            </a>
            <a href="/chat?tab=tools" class="portal-card">
                <span class="icon">🛠️</span>
                <div class="title">TOOLS</div>
                <div class="desc">Technical utility hub & research center.</div>
            </a>
            <a href="/chat?tab=business" class="portal-card">
                <span class="icon">📈</span>
                <div class="title">BUSINESS</div>
                <div class="desc">Multi-agent trading arena & analytics.</div>
            </a>
        </div>

        <a href="/login" class="btn-auth">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" style="width:18px; margin-right:12px;">
            AUTHENTICATE SESSION
        </a>

        <div class="footer">
            DESIGNED BY <span>BAYAZID HS</span> | © 2025 MARIN
        </div>
    </div>
</body>
</html>
