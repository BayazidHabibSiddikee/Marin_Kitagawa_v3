<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Hub — Knowledge Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #0f0f1a;
            --panel: #12121e;
            --border: #1e1e35;
            --purple: #8b5cf6;
            --violet: #a78bfa;
            --text: #d1d5db;
            --dim: #6b7280;
            --muted: #3f3f5a;
            --success: #10b981;
            --gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(167, 139, 250, 0.05));
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-left i {
            font-size: 1.8rem;
            color: var(--purple);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .header-subtitle {
            font-size: 0.85rem;
            color: var(--dim);
            margin-top: 0.25rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--purple);
        }

        .container {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
        }

        .search-section {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .search-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--purple);
        }

        .search-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .input-group {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--purple);
            background: rgba(139, 92, 246, 0.05);
        }

        input::placeholder {
            color: var(--dim);
        }

        .input-group i {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--purple);
        }

        .btn {
            background: linear-gradient(135deg, var(--purple), var(--violet));
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .results-section {
            margin-top: 2rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .result-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .result-card:hover {
            border-color: var(--purple);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.15);
            transform: translateY(-4px);
        }

        .result-icon {
            font-size: 2rem;
            color: var(--purple);
            margin-bottom: 0.5rem;
        }

        .result-title {
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            display: block;
            text-decoration: none;
            transition: color 0.2s;
        }

        .result-card:hover .result-title {
            color: var(--purple);
        }

        .result-snippet {
            font-size: 0.85rem;
            color: var(--dim);
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .result-meta {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            gap: 1rem;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--dim);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #86efac;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .search-row {
                flex-direction: column;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <i class="fas fa-book-open"></i>
            <div>
                <h1>Research Hub</h1>
                <div class="header-subtitle">Knowledge Explorer & PDF Finder</div>
            </div>
        </div>
        <div class="nav-links">
            <a href="/">← Back Home</a>
            <a href="/codeflow">FLOW</a>
        </div>
    </header>

    <div class="container">
        <div class="search-section">
            <div class="search-title">🔍 Search Knowledge Base</div>
            <div class="search-row">
                <div class="input-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-query" placeholder="Search topics, books, papers...">
                </div>
                <button class="btn" id="btn-pdf" onclick="setMode('pdf')" style="padding:0.8rem 1.2rem;">
                    <i class="fas fa-file-pdf"></i> PDF
                </button>
                <button class="btn" id="btn-web" onclick="setMode('web')" style="padding:0.8rem 1.2rem; background:transparent; border:1px solid #8b5cf6; color:#8b5cf6;">
                    <i class="fas fa-globe"></i> WEB
                </button>
                <button class="btn" onclick="performSearch()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            <div style="font-size:0.75rem; color:var(--dim); margin-top:0.5rem;">
                <i class="fas fa-spider"></i> Powered by Camofox stealth browser
            </div>
        </div>

        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--dim);">Searching knowledge base...</p>
        </div>

        <div id="results" class="results-section">
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <p>Enter a search query to find resources</p>
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-query');
        let _mode = 'pdf';

        function setMode(m) {
            _mode = m;
            const grad = 'linear-gradient(135deg, #8b5cf6, #a78bfa)';
            if (m === 'pdf') {
                document.getElementById('btn-pdf').style.cssText = '';
                document.getElementById('btn-web').style.cssText = 'padding:0.8rem 1.2rem; background:transparent; border:1px solid #8b5cf6; color:#8b5cf6;';
                searchInput.placeholder = 'Search topics, books, papers...';
            } else {
                document.getElementById('btn-web').style.cssText = '';
                document.getElementById('btn-pdf').style.cssText = 'padding:0.8rem 1.2rem; background:transparent; border:1px solid #8b5cf6; color:#8b5cf6;';
                searchInput.placeholder = 'Search the web via Camofox...';
            }
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        async function performSearch() {
            const query = searchInput.value.trim();
            const loader = document.getElementById('loader');
            const resultsDiv = document.getElementById('results');

            if (!query) {
                resultsDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter a search query</div>';
                return;
            }

            loader.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch('/api/research/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: query, mode: _mode})
                });
                
                if (!response.ok) throw new Error('Search failed');
                
                const data = await response.json();
                const icon = _mode === 'pdf' ? 'fa-file-pdf' : 'fa-globe';
                
                if (data.results && data.results.length > 0) {
                    resultsDiv.innerHTML = '<div class="results-grid">' + 
                        data.results.map((r, i) => `
                            <div class="result-card">
                                <div class="result-icon"><i class="fas ${icon}"></i></div>
                                <a href="${r.href || '#'}" target="_blank" class="result-title">${escapeHtml(r.title || 'Untitled')}</a>
                                <div class="result-snippet">${escapeHtml((r.body || 'No description available').substring(0, 150))}...</div>
                                <div class="result-meta">
                                    <span><i class="fas fa-spider"></i> Camofox · Result ${i + 1}</span>
                                </div>
                            </div>
                        `).join('') + 
                        '</div>';
                } else {
                    resultsDiv.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No results found for "<strong>' + escapeHtml(query) + '</strong>"</p></div>';
                }
            } catch (err) {
                resultsDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Error: ' + escapeHtml(err.message) + '</div>';
            } finally {
                loader.style.display = 'none';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
