<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena — Marin vs </title>

<!-- Fonts: Marin side uses Playfair/Zen,  side uses Cinzel/Rajdhani -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

<style>
/* ═══════════════════════════════════════════════════════
   ROOT TOKENS
═══════════════════════════════════════════════════════ */
:root {
  /* Shared */
  --bg: #13100e;
  --divider:   #2a1a2e;

  /* Marin — cherry blossom */
  --m-primary:  #ffb7c5;
  --m-deep:     #e91e8c;
  --m-glow:     #ff6b9d;
  --m-bg:       #1a0a10;
  --m-panel:    #2d0a1a;
  --m-border:   #ff6b9d22;
  --m-text:     #fce4ec;
  --m-dim:      #ff6b9d66;

  /*  — sword king */
  --b-primary:  #a78bfa;
  --b-deep:     #8b5cf6;
  --b-glow:     #7c3aed;
  --b-bg:       #0a0a0f;
  --b-panel:    #12121e;
  --b-border:   #8b5cf622;
  --b-text:     #d1d5db;
  --b-dim:      #6b7280;

  /* Judge — neutral gold */
  --j-primary: #fbbf24;
  --j-deep:    #d97706;
  --j-bg:      #0f0c02;
  --j-panel:   #1a1500;
  --j-border:  #fbbf2430;
  --j-text:    #fef3c7;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
}

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: #0c080e;
  border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

/* gradient border bottom — half pink, half purple */
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    var(--m-glow) 0%,
    transparent 35%,
    transparent 65%,
    var(--b-deep) 100%
  );
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.back-btn {
  color: #ffffff44;
  text-decoration: none;
  font-size: 1.1rem;
  transition: color .2s;
}
.back-btn:hover { color: #fff; }

.-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.-title .marin-name {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--m-primary);
  text-shadow: 0 0 16px rgba(255,107,157,0.5);
}
.-title .vs {
  font-family: 'Share Tech Mono', monospace;
  font-size: .7rem;
  color: #ffffff33;
  padding: 2px 8px;
  border: 1px solid #ffffff11;
  border-radius: 3px;
  letter-spacing: .12em;
}
.-title .bayazid-name {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--b-primary);
  text-shadow: 0 0 16px rgba(139,92,246,0.5);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.status-pill {
  font-family: 'Share Tech Mono', monospace;
  font-size: .62rem;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .08em;
}
.status-pill.idle {
  background: #ffffff08;
  border: 1px solid #ffffff11;
  color: #ffffff33;
}
.status-pill.fighting {
  background: rgba(251,191,36,0.1);
  border: 1px solid rgba(251,191,36,0.3);
  color: var(--j-primary);
  animation: pillPulse 1.5s infinite;
}
.status-pill.done {
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.3);
  color: #10b981;
}
@keyframes pillPulse {
  0%,100%{opacity:1;} 50%{opacity:.5;}
}

/* ═══════════════════════════════════════════════════════
   TOPIC INPUT STRIP
═══════════════════════════════════════════════════════ */
.topic-strip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  background: #0f0b12;
  border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}

.topic-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: .65rem;
  color: #ffffff33;
  letter-spacing: .15em;
  white-space: nowrap;
}

#topic-input {
  flex: 1;
  background: #1a1020;
  border: 1px solid var(--divider);
  border-radius: 6px;
  color: #e5e7eb;
  font-family: 'Rajdhani', sans-serif;
  font-size: .95rem;
  font-weight: 500;
  padding: 8px 14px;
  outline: none;
  transition: border-color .2s;
}
#topic-input:focus {
  border-color: var(--j-primary);
  box-shadow: 0 0 0 2px rgba(251,191,36,0.08);
}
#topic-input::placeholder { color: #ffffff22; }

.fight-btn {
  padding: 8px 20px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  letter-spacing: .06em;
  background: linear-gradient(135deg, var(--m-deep), var(--b-deep));
  color: #fff;
  transition: all .2s;
  white-space: nowrap;
}
.fight-btn:hover {
  box-shadow: 0 0 20px rgba(139,92,246,0.4), 0 0 20px rgba(233,30,140,0.3);
  transform: translateY(-1px);
}
.fight-btn:disabled {
  opacity: .4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.reset-btn {
  padding: 8px 14px;
  border-radius: 5px;
  border: 1px solid var(--divider);
  background: transparent;
  color: #ffffff44;
  font-family: 'Share Tech Mono', monospace;
  font-size: .65rem;
  letter-spacing: .08em;
  cursor: pointer;
  transition: all .2s;
}
.reset-btn:hover { color: #fff; border-color: #ffffff33; }

/* ═══════════════════════════════════════════════════════
   ARENA — SPLIT COLUMNS
═══════════════════════════════════════════════════════ */
. {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Column headers */
.col-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid;
  flex-shrink: 0;
}

.col-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .9rem;
  flex-shrink: 0;
}

.col-name { font-size: .9rem; font-weight: 600; letter-spacing: .04em; }
.col-role { font-size: .72rem; opacity: .5; margin-left: auto; font-style: italic; }

/* ── MARIN COLUMN ── */
.col-marin {
  flex: 1;
  background: var(--m-bg);
  border-right: 1px solid var(--divider);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 80% 40% at 0% 0%, #ff6b9d14 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, #c2185b0e 0%, transparent 60%);
}

.col-marin .col-header {
  border-color: var(--m-border);
  background: rgba(45,10,26,0.6);
}
.col-marin .col-avatar {
  background: linear-gradient(135deg, #ffb7c5, #e91e8c);
}
.col-marin .col-name {
  font-family: 'Playfair Display', serif;
  color: var(--m-primary);
  text-shadow: 0 0 12px rgba(255,107,157,0.4);
}
.col-marin .col-role {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--m-dim);
}

/* ── BAYAZID COLUMN ── */
.col-bayazid {
  flex: 1;
  background: var(--b-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 80% 40% at 100% 0%, #8b5cf614 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 0% 100%, #4c1d950e 0%, transparent 60%);
}

/* scan line on bayazid side */
.col-bayazid::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 2px,
    rgba(139,92,246,0.025) 2px, rgba(139,92,246,0.025) 4px
  );
  pointer-events: none;
}

.col-bayazid {
  position: relative;
}

.col-bayazid .col-header {
  border-color: var(--b-border);
  background: rgba(18,18,30,0.7);
  position: relative;
  z-index: 1;
}
.col-bayazid .col-avatar {
  background: linear-gradient(135deg, var(--b-deep), #4c1d95);
  border: 1px solid rgba(139,92,246,0.4);
  border-radius: 4px;
  font-size: .8rem;
}
.col-bayazid .col-name {
  font-family: 'Cinzel', serif;
  color: var(--b-primary);
  letter-spacing: .08em;
  text-shadow: 0 0 12px rgba(139,92,246,0.4);
}
.col-bayazid .col-role {
  font-family: 'Share Tech Mono', monospace;
  color: var(--b-dim);
  letter-spacing: .06em;
  font-style: normal;
}

/* ── SCROLL AREAS ── */
.col-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
.col-scroll::-webkit-scrollbar { width: 3px; }
.col-scroll::-webkit-scrollbar-track { background: transparent; }
.col-scroll::-webkit-scrollbar-thumb { background: #ffffff15; border-radius: 2px; }

/* ── BUBBLES ── */
.bubble {
  padding: 14px 16px;
  border-radius: 12px;
  line-height: 1.68;
  font-size: .9rem;
  animation: bubbleIn .35s ease;
}
@keyframes bubbleIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.col-marin .bubble {
  background: var(--m-panel);
  border: 1px solid var(--m-border);
  color: var(--m-text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  border-top-left-radius: 4px;
}

.col-bayazid .bubble {
  background: var(--b-panel);
  border: 1px solid var(--b-border);
  color: var(--b-text);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  border-top-left-radius: 4px;
}

/* topic echo bubble */
.topic-echo {
  text-align: center;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: .78rem;
  align-self: center;
}
.col-marin .topic-echo {
  background: rgba(255,107,157,0.08);
  border: 1px solid rgba(255,107,157,0.2);
  color: var(--m-glow);
  font-family: 'Playfair Display', serif;
  font-style: italic;
}
.col-bayazid .topic-echo {
  background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.2);
  color: var(--b-primary);
  font-family: 'Share Tech Mono', monospace;
  font-size: .7rem;
  letter-spacing: .06em;
}

/* typing dots */
.typing-dots {
  display: flex;
  gap: 5px;
  padding: 6px 0;
  align-items: center;
}
.typing-dots .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  animation: dotBounce .9s infinite;
}
.col-marin .dot   { background: var(--m-glow); }
.col-bayazid .dot { background: var(--b-deep); }
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .3s; }
@keyframes dotBounce {
  0%,60%,100% { transform: translateY(0); }
  30%          { transform: translateY(-7px); }
}

/* markdown in bubbles */
.bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 5px; }
.col-marin .bubble h1,
.col-marin .bubble h2,
.col-marin .bubble h3 {
  font-family: 'Playfair Display', serif;
  color: var(--m-primary);
}
.col-bayazid .bubble h1,
.col-bayazid .bubble h2,
.col-bayazid .bubble h3 {
  font-family: 'Cinzel', serif;
  color: var(--b-primary);
  font-size: .95rem;
  letter-spacing: .04em;
}
.bubble strong { font-weight: 700; }
.col-marin   .bubble strong { color: var(--m-primary); }
.col-bayazid .bubble strong { color: var(--b-primary); }
.bubble em { font-style: italic; opacity: .8; }
.bubble p { margin-bottom: .5em; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul,.bubble ol { padding-left: 18px; margin: 6px 0; }
.bubble li { margin-bottom: 3px; }
.bubble code {
  font-family: 'Share Tech Mono', monospace;
  font-size: .8em;
  padding: 1px 5px;
  border-radius: 3px;
}
.col-marin   .bubble code { background: rgba(255,107,157,0.12); color: var(--m-glow); }
.col-bayazid .bubble code { background: rgba(139,92,246,0.12); color: var(--b-primary); }
.bubble pre {
  background: #05050a;
  border-radius: 6px;
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
  font-family: 'Share Tech Mono', monospace;
  font-size: .78rem;
  line-height: 1.5;
}
.col-marin   .bubble pre { border: 1px solid rgba(255,107,157,0.15); color: #ffb7c5; }
.col-bayazid .bubble pre { border: 1px solid rgba(139,92,246,0.15); color: #c4b5fd; }
.bubble pre code { background: none; padding: 0; color: inherit; }

/* ═══════════════════════════════════════════════════════
   JUDGE PANEL — bottom full width
═══════════════════════════════════════════════════════ */
.judge-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--divider);
  background: var(--j-bg);
  max-height: 0;
  overflow: hidden;
  transition: max-height .5s ease;
  position: relative;
}
.judge-panel.open {
  max-height: 42vh;
}
.judge-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--j-primary), transparent);
}

.judge-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-height: 42vh;
}

.judge-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--j-border);
  flex-shrink: 0;
}
.judge-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--j-primary), var(--j-deep));
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem;
}
.judge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: .7rem;
  color: var(--j-primary);
  letter-spacing: .12em;
}
.judge-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: .6rem;
  color: var(--j-deep);
  margin-left: auto;
  letter-spacing: .08em;
  opacity: .7;
}
.master-btn {
  background: var(--j-deep);
  color: white;
  border: none;
  font-family: 'Share Tech Mono', monospace;
  font-size: .6rem;
  padding: 4px 10px;
  border-radius: 3px;
  cursor: pointer;
  margin-left: 12px;
  transition: all .2s;
  letter-spacing: .05em;
}
.master-btn:hover { background: var(--j-primary); color: #000; }
.master-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.judge-block {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 16px;
  margin: 12px 0;
  width: 100%;
}
.judge-block .judge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: .7rem;
  color: var(--j-primary);
  letter-spacing: .12em;
  margin-bottom: 8px;
}
.judge-block .judge-text {
  font-size: .85rem;
  color: #ccc;
  line-height: 1.6;
}

.judge-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  scroll-behavior: smooth;
}
.judge-scroll::-webkit-scrollbar { width: 3px; }
.judge-scroll::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.2); border-radius: 2px; }

.judge-bubble {
  background: var(--j-panel);
  border: 1px solid var(--j-border);
  border-radius: 10px;
  padding: 16px 18px;
  color: var(--j-text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: .9rem;
  line-height: 1.75;
  font-weight: 300;
  animation: bubbleIn .4s ease;
}
.judge-bubble strong { color: var(--j-primary); }
.judge-bubble h1,.judge-bubble h2,.judge-bubble h3 {
  color: var(--j-primary);
  font-family: 'Playfair Display', serif;
  margin: 10px 0 5px;
}
.judge-bubble ul,.judge-bubble ol { padding-left: 18px; margin: 6px 0; }
.judge-bubble li { margin-bottom: 3px; }

/* ═══════════════════════════════════════════════════════
   ROUND DIVIDER
═══════════════════════════════════════════════════════ */
.round-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  align-self: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: .62rem;
  color: #ffffff25;
  letter-spacing: .15em;
}
.round-badge::before,.round-badge::after {
  content: '';
  display: block;
  width: 40px; height: 1px;
  background: #ffffff15;
}

/* empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  opacity: .3;
}
.col-marin   .empty-state { font-family: 'Playfair Display', serif; color: var(--m-glow); }
.col-bayazid .empty-state { font-family: 'Share Tech Mono', monospace; color: var(--b-dim); font-size: .75rem; letter-spacing: .1em; }
.empty-icon { font-size: 2rem; }

/* loading bar — spans full  width above judge */
.loading-bar {
  height: 2px;
  background: linear-gradient(90deg, var(--m-glow), var(--j-primary), var(--b-deep));
  background-size: 200% 100%;
  animation: loadSweep 1.2s linear infinite;
  display: none;
  flex-shrink: 0;
}
.loading-bar.active { display: block; }
@keyframes loadSweep {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <a href="/" class="back-btn">←</a>
    <div class="-title">
      <span class="marin-name">🌸 Marin</span>
      <span class="vs">VS</span>
      <span class="bayazid-name"> ⚔</span>
    </div>
  </div>
  <div class="header-right">
    <span class="status-pill idle" id="status-pill">IDLE</span>
    <a href="/"
       style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:#6b728066;text-decoration:none;padding:3px 10px;border:1px solid #ffffff11;border-radius:3px;transition:all .2s"
       onmouseover="this.style.color='#d1d5db'" onmouseout="this.style.color='#6b728066'">
      HOME
    </a>
    <a href="/chat?agent=marin"
       style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:#ff6b9d66;text-decoration:none;padding:3px 10px;border:1px solid #ff6b9d22;border-radius:3px;transition:all .2s"
       onmouseover="this.style.color='#ffb7c5'" onmouseout="this.style.color='#ff6b9d66'">
      MARIN CHAT
    </a>
    <a href="/chat"
       style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:#8b5cf666;text-decoration:none;padding:3px 10px;border:1px solid #8b5cf622;border-radius:3px;transition:all .2s"
       onmouseover="this.style.color='#a78bfa'" onmouseout="this.style.color='#8b5cf666'">
      BAYAZID CHAT
    </a>
    <a href="/moduleflow"
       style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:#22d3ee66;text-decoration:none;padding:3px 10px;border:1px solid #22d3ee22;border-radius:3px;transition:all .2s"
       onmouseover="this.style.color='#22d3ee'" onmouseout="this.style.color='#22d3ee66'">
      FLOW
    </a>
    </div>
</header>

<!-- ── TOPIC INPUT ──────────────────────────────────────────────── -->
<div class="topic-strip">
  <span class="topic-label">TOPIC</span>
  <input id="topic-input" type="text"
    placeholder="Enter a topic, dilemma, or question for them to argue about…"
    onkeydown="if(event.key==='Enter')startFight()">
  <button class="reset-btn" onclick="resetArena()" title="Clear ">↺ RESET</button>
  <button class="fight-btn" id="fight-btn" onclick="startFight()">⚔ BEGIN FIGHT</button>
</div>

<!-- ── ARENA COLUMNS ────────────────────────────────────────────── -->
<div class="" id="debate-container">

  <!-- MARIN SIDE -->
  <div class="col-marin">
    <div class="col-header">
      <div class="col-avatar">🌸</div>
      <span class="col-name">Marin Kitagawa</span>
      <span class="col-role">creative · expressive · broad</span>
    </div>
    <div class="col-scroll" id="marin-scroll">
      <div class="empty-state" id="marin-empty">
        <div class="empty-icon">🌸</div>
        <div>Marin is waiting…</div>
      </div>
    </div>
  </div>

  <!-- BAYAZID SIDE -->
  <div class="col-bayazid">
    <div class="col-header">
      <div class="col-avatar">⚔</div>
      <span class="col-name">BAYAZID HS-02</span>
      <span class="col-role">SYSTEMS · EXECUTION · PRECISE</span>
    </div>
    <div class="col-scroll" id="bayazid-scroll">
      <div class="empty-state" id="bayazid-empty">
        <div class="empty-icon">⚔</div>
        <div>BAYAZID IS IDLE</div>
      </div>
    </div>
  </div>
</div>

<!-- loading bar -->
<div class="loading-bar" id="loading-bar"></div>

<!-- ── JUDGE PANEL ───────────────────────────────────────────────── -->
<div class="judge-panel" id="judge-panel">
  <div class="judge-inner">
    <div class="judge-header">
      <div class="judge-avatar">⚖</div>
      <span class="judge-label">JUDGE · SYNTHESIS</span>
      <span class="judge-sub">reading both arguments…</span>
      <button id="send-master-btn" class="master-btn" style="display:none" onclick="forwardToMaster()">⚔ FORWARD TO MASTER</button>
    </div>
    <div class="judge-scroll" id="judge-scroll">
      <!-- judge bubble inserted here -->
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// MARKDOWN + KATEX RENDERER
// ═══════════════════════════════════════════════════════════════
function renderMath(html) {
  html = html.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { displayMode: true, throwOnError: false }); }
    catch { return _; }
  });
  html = html.replace(/(?<!\\)\$([^\$\n]+?)(?<!\\)\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { displayMode: false, throwOnError: false }); }
    catch { return _; }
  });
  return html;
}
function render(text) {
  return renderMath(marked.parse(text));
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let fighting = false;
let roundNumber = 0;
let lastJudgeVerdict = '';   // stored so "Fight Again" can pass it as context

function setStatus(s) {
  const pill = document.getElementById('status-pill');
  pill.className = `status-pill ${s}`;
  pill.textContent = s === 'idle' ? 'IDLE' : s === 'fighting' ? '⚔ FIGHTING' : '✓ DONE';
}

function setLoading(on) {
  document.getElementById('loading-bar').classList.toggle('active', on);
}

// ═══════════════════════════════════════════════════════════════
// BUBBLE HELPERS
// ═══════════════════════════════════════════════════════════════
function addTopicEcho(scrollId, topic) {
  const el = document.createElement('div');
  el.className = 'topic-echo';
  el.textContent = `"${topic}"`;
  document.getElementById(scrollId).appendChild(el);
  scrollDown(scrollId);
}

function addRoundBadge(scrollId, label) {
  const el = document.createElement('div');
  el.className = 'round-badge';
  el.textContent = label;
  document.getElementById(scrollId).appendChild(el);
  scrollDown(scrollId);
}

function showTyping(scrollId) {
  const id = `typing-${scrollId}`;
  if (document.getElementById(id)) return;
  const el = document.createElement('div');
  el.id = id;
  el.className = 'bubble';
  el.innerHTML = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  document.getElementById(scrollId).appendChild(el);
  scrollDown(scrollId);
}

function hideTyping(scrollId) {
  const el = document.getElementById(`typing-${scrollId}`);
  if (el) el.remove();
}

function addBubble(scrollId, content, streaming = false) {
  const id = `bubble-${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const el = document.createElement('div');
  el.className = 'bubble';
  el.id = id;
  el.innerHTML = streaming ? '' : render(content);
  document.getElementById(scrollId).appendChild(el);
  scrollDown(scrollId);
  return id;
}

function updateBubble(id, text) {
  const el = document.getElementById(id);
  if (el) { el.innerHTML = render(text); scrollDown(null, el); }
}

function scrollDown(scrollId, el) {
  if (scrollId) {
    const c = document.getElementById(scrollId);
    if (c) c.scrollTop = c.scrollHeight;
  }
  if (el) {
    const p = el.closest('.col-scroll, .judge-scroll');
    if (p) p.scrollTop = p.scrollHeight;
  }
}

// ═══════════════════════════════════════════════════════════════
// STREAM from //stream
// ═══════════════════════════════════════════════════════════════
async function streamFromBackend(payload, scrollId) {
  const bubbleId = addBubble(scrollId, '', true);
  let full = '';
  try {
    const res = await fetch('//stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += dec.decode(value, { stream: true });
      updateBubble(bubbleId, full);
      scrollDown(scrollId);
    }
  } catch (e) {
    full = `*(server not connected — UI preview)*\n\n**${payload.character}** would argue about: *${payload.topic}*`;
    updateBubble(bubbleId, full);
  }
  return full;
}

// ═══════════════════════════════════════════════════════════════
// MAIN FIGHT FLOW
// isFightAgain = true  →  passes judge's previous verdict as context
//                         so both characters respond to it
// ═══════════════════════════════════════════════════════════════
async function startFight(isFightAgain = false) {
  if (fighting) return;

  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) {
    document.getElementById('topic-input').focus();
    document.getElementById('topic-input').style.borderColor = 'var(--m-glow)';
    setTimeout(() => document.getElementById('topic-input').style.borderColor = '', 1200);
    return;
  }

  fighting = true;
  roundNumber++;
  document.getElementById('fight-btn').disabled = true;
  document.getElementById('topic-input').disabled = true;

  // ── Safe clear of empty-state placeholders (they may not exist after round 1) ──
  document.getElementById('marin-empty')?.remove();
  document.getElementById('bayazid-empty')?.remove();

  // Hide judge panel and clear it for the new round
  document.getElementById('judge-panel').classList.remove('open');
  document.getElementById('judge-scroll').innerHTML = '';

  setStatus('fighting');
  setLoading(true);

  // Build judge context for "Fight Again" — both characters get to see the verdict
  const judgeContext = (isFightAgain && lastJudgeVerdict)
    ? `The judge's verdict from the previous round:\n\n${lastJudgeVerdict}\n\nNow respond to the judge's analysis and re-argue your position.`
    : '';

  // ── ROUND BADGE ─────────────────────────────────────────────
  const roundLabel = isFightAgain ? `ROUND ${roundNumber} — REMATCH` : `ROUND ${roundNumber}`;
  addRoundBadge('marin-scroll', roundLabel);
  addRoundBadge('bayazid-scroll', roundLabel);

  // ── TOPIC ECHO (only on first round, not on rematch) ────────
  if (!isFightAgain) {
    addTopicEcho('marin-scroll', topic);
    addTopicEcho('bayazid-scroll', topic);
  }

  // ── MARIN ARGUES ────────────────────────────────────────────
  showTyping('marin-scroll');
  const marinArg = await streamFromBackend({
    character: 'marin',
    role: 'argue',
    topic,
    context: judgeContext
  }, 'marin-scroll');
  hideTyping('marin-scroll');

  // ── BAYAZID ARGUES (sees Marin's arg + judge context) ───────
  showTyping('bayazid-scroll');
  const bayazidArg = await streamFromBackend({
    character: 'bayazid',
    role: 'argue',
    topic,
    context: judgeContext
      ? `${judgeContext}\n\nMarin just argued:\n${marinArg}`
      : `Marin's argument:\n${marinArg}`
  }, 'bayazid-scroll');
  hideTyping('bayazid-scroll');

  setLoading(false);

  // ── JUDGE ───────────────────────────────────────────────────
  document.getElementById('judge-panel').classList.add('open');
  document.querySelector('.judge-sub').textContent = 'synthesizing…';

  const judgeEl = document.createElement('div');
  judgeEl.className = 'judge-bubble';
  document.getElementById('judge-scroll').appendChild(judgeEl);

  let judgeFull = '';
  try {
    const res = await fetch('//stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        character: 'judge',
        role: 'conclude',
        topic,
        marin_arg: marinArg,
        bayazid_arg: bayazidArg,
        context: isFightAgain ? `This is round ${roundNumber}. Previous verdict:\n${lastJudgeVerdict}` : ''
      })
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      judgeFull += dec.decode(value, { stream: true });
      judgeEl.innerHTML = render(judgeFull);
      document.getElementById('judge-scroll').scrollTop = document.getElementById('judge-scroll').scrollHeight;
    }
  } catch(e) {
    judgeFull = `*(judge offline)*\n\nBoth argued about **"${topic}"**.`;
    judgeEl.innerHTML = render(judgeFull);
  }

  // Save verdict for next "Fight Again"
  lastJudgeVerdict = judgeFull;

  document.querySelector('.judge-sub').textContent = `round ${roundNumber} verdict delivered`;
  document.getElementById('send-master-btn').style.display = 'block';
  document.getElementById('send-master-btn').disabled = false;
  document.getElementById('send-master-btn').textContent = '⚔ FORWARD TO MASTER';

  setStatus('done');
  fighting = false;
  document.getElementById('fight-btn').disabled = false;
  document.getElementById('fight-btn').textContent = '⚔ FIGHT AGAIN';
  document.getElementById('fight-btn').onclick = () => startFight(true);
  document.getElementById('topic-input').disabled = false;
}

async function forwardToMaster() {
  const btn = document.getElementById('send-master-btn');
  btn.disabled = true;
  btn.textContent = '⚔ EXECUTING MASTER AGENT…';
  try {
    const res = await fetch('//send_master', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: lastJudgeVerdict })
    });
    const data = await res.json();
    if (data.status === 'executed') {
      btn.textContent = '✓ MASTER EXECUTED';
      // Show result in a new judge-style block
      const container = document.getElementById('debate-container');
      const block = document.createElement('div');
      block.className = 'judge-block';
      block.innerHTML = `<div class="judge-label">⚙️ MASTER AGENT RESULT</div><div class="judge-text">${data.result.replace(/\n/g, '<br>')}</div>`;
      container.appendChild(block);
      block.scrollIntoView({ behavior: 'smooth' });
    } else {
      btn.textContent = '✗ ' + (data.error || 'FAILED');
      btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = '✗ ERROR';
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════════
// RESET — clears everything, goes back to round 0
// ═══════════════════════════════════════════════════════════════
function resetArena() {
  if (fighting) return;

  roundNumber = 0;
  lastJudgeVerdict = '';

  document.getElementById('marin-scroll').innerHTML =
    `<div class="empty-state" id="marin-empty"><div class="empty-icon">🌸</div><div>Marin is waiting…</div></div>`;
  document.getElementById('bayazid-scroll').innerHTML =
    `<div class="empty-state" id="bayazid-empty"><div class="empty-icon">⚔</div><div>BAYAZID IS IDLE</div></div>`;

  document.getElementById('judge-panel').classList.remove('open');
  document.getElementById('judge-scroll').innerHTML = '';
  document.querySelector('.judge-sub').textContent = 'reading both arguments…';
  document.getElementById('send-master-btn').style.display = 'none';

  document.getElementById('topic-input').value = '';
  document.getElementById('topic-input').disabled = false;
  document.getElementById('fight-btn').disabled = false;
  document.getElementById('fight-btn').textContent = '⚔ BEGIN FIGHT';
  document.getElementById('fight-btn').onclick = () => startFight(false);
  setStatus('idle');
  setLoading(false);
}
</script>
</body>
</html>
