version: '3.8'

services:
  # Modular trading strategy execution engine
  # Inspired by 'my-bot' architecture
  strategy-executor:
    image: python:3.11-slim
    container_name: marin-trading-node
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - BINANCE_API_KEY=$BINANCE_API_KEY
      - BINANCE_API_SECRET=$BINANCE_API_SECRET
    command: python3 tools/trade_executor.py
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - marin-net

networks:
  marin-net:
    external: true
    name: marin_marin-net
